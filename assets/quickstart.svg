<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="ogGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8432A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8432A;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#FF8C42;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="#0D0D0D"/>

  <!-- Arrow connectors between cards -->
  <line x1="188" y1="100" x2="205" y2="100" style="stroke:url(#arrowGrad);stroke-width:2"/>
  <polygon points="205,96 213,100 205,104" fill="#F07A3A"/>

  <line x1="388" y1="100" x2="405" y2="100" style="stroke:url(#arrowGrad);stroke-width:2"/>
  <polygon points="405,96 413,100 405,104" fill="#F07A3A"/>

  <line x1="588" y1="100" x2="605" y2="100" style="stroke:url(#arrowGrad);stroke-width:2"/>
  <polygon points="605,96 613,100 605,104" fill="#F07A3A"/>

  <!-- Step 1: Clone -->
  <rect x="15" y="20" width="170" height="160" rx="10" fill="#1A1A1A" style="stroke:#2E2E2E;stroke-width:1"/>
  <!-- Step number circle -->
  <circle cx="55" cy="52" r="14" fill="url(#ogGrad)"/>
  <text x="55" y="57" text-anchor="middle" style="font-size:12px;font-weight:700;fill:#FFFFFF;font-family:system-ui,sans-serif">1</text>
  <!-- Icon: git branch -->
  <g transform="translate(85,40)">
    <circle cx="0" cy="0" r="3" fill="none" style="stroke:#A0A0A0;stroke-width:1.5"/>
    <circle cx="0" cy="18" r="3" fill="none" style="stroke:#A0A0A0;stroke-width:1.5"/>
    <circle cx="12" cy="8" r="3" fill="none" style="stroke:#A0A0A0;stroke-width:1.5"/>
    <line x1="0" y1="3" x2="0" y2="15" style="stroke:#A0A0A0;stroke-width:1.5"/>
    <path d="M0,5 Q0,8 4,8 L9,8" fill="none" style="stroke:#A0A0A0;stroke-width:1.5"/>
  </g>
  <!-- Title -->
  <text x="100" y="95" text-anchor="middle" style="font-size:16px;font-weight:600;fill:#FFFFFF;font-family:system-ui,sans-serif">Clone</text>
  <!-- Command -->
  <text x="100" y="120" text-anchor="middle" style="font-size:10px;fill:#A0A0A0;font-family:'Courier New',monospace">git clone</text>
  <!-- Subtle accent line -->
  <rect x="35" y="140" width="130" height="2" rx="1" fill="url(#ogGrad)" style="opacity:0.3"/>

  <!-- Step 2: Configure -->
  <rect x="215" y="20" width="170" height="160" rx="10" fill="#1A1A1A" style="stroke:#2E2E2E;stroke-width:1"/>
  <circle cx="255" cy="52" r="14" fill="url(#ogGrad)"/>
  <text x="255" y="57" text-anchor="middle" style="font-size:12px;font-weight:700;fill:#FFFFFF;font-family:system-ui,sans-serif">2</text>
  <!-- Icon: gear -->
  <g transform="translate(293,44)">
    <circle cx="0" cy="0" r="5" fill="none" style="stroke:#A0A0A0;stroke-width:1.5"/>
    <line x1="0" y1="-9" x2="0" y2="-6" style="stroke:#A0A0A0;stroke-width:1.5"/>
    <line x1="0" y1="6" x2="0" y2="9" style="stroke:#A0A0A0;stroke-width:1.5"/>
    <line x1="-9" y1="0" x2="-6" y2="0" style="stroke:#A0A0A0;stroke-width:1.5"/>
    <line x1="6" y1="0" x2="9" y2="0" style="stroke:#A0A0A0;stroke-width:1.5"/>
    <line x1="-6.4" y1="-6.4" x2="-4.2" y2="-4.2" style="stroke:#A0A0A0;stroke-width:1.5"/>
    <line x1="4.2" y1="4.2" x2="6.4" y2="6.4" style="stroke:#A0A0A0;stroke-width:1.5"/>
    <line x1="6.4" y1="-6.4" x2="4.2" y2="-4.2" style="stroke:#A0A0A0;stroke-width:1.5"/>
    <line x1="-4.2" y1="4.2" x2="-6.4" y2="6.4" style="stroke:#A0A0A0;stroke-width:1.5"/>
  </g>
  <text x="300" y="95" text-anchor="middle" style="font-size:16px;font-weight:600;fill:#FFFFFF;font-family:system-ui,sans-serif">Configure</text>
  <text x="300" y="120" text-anchor="middle" style="font-size:10px;fill:#A0A0A0;font-family:'Courier New',monospace">cp .env.example .env</text>
  <rect x="235" y="140" width="130" height="2" rx="1" fill="url(#ogGrad)" style="opacity:0.3"/>

  <!-- Step 3: Launch -->
  <rect x="415" y="20" width="170" height="160" rx="10" fill="#1A1A1A" style="stroke:#2E2E2E;stroke-width:1"/>
  <circle cx="455" cy="52" r="14" fill="url(#ogGrad)"/>
  <text x="455" y="57" text-anchor="middle" style="font-size:12px;font-weight:700;fill:#FFFFFF;font-family:system-ui,sans-serif">3</text>
  <!-- Icon: rocket -->
  <g transform="translate(493,44)">
    <path d="M0,-9 C3,-9 7,-5 7,0 L4,4 L-4,4 L-7,0 C-7,-5 -3,-9 0,-9Z" fill="none" style="stroke:#A0A0A0;stroke-width:1.5"/>
    <circle cx="0" cy="-2" r="2" fill="none" style="stroke:#A0A0A0;stroke-width:1.2"/>
    <line x1="-3" y1="4" x2="-1" y2="8" style="stroke:#A0A0A0;stroke-width:1.5"/>
    <line x1="3" y1="4" x2="1" y2="8" style="stroke:#A0A0A0;stroke-width:1.5"/>
  </g>
  <text x="500" y="95" text-anchor="middle" style="font-size:16px;font-weight:600;fill:#FFFFFF;font-family:system-ui,sans-serif">Launch</text>
  <text x="500" y="120" text-anchor="middle" style="font-size:10px;fill:#A0A0A0;font-family:'Courier New',monospace">docker compose up -d</text>
  <rect x="435" y="140" width="130" height="2" rx="1" fill="url(#ogGrad)" style="opacity:0.3"/>

  <!-- Step 4: Use -->
  <rect x="615" y="20" width="170" height="160" rx="10" fill="#1A1A1A" style="stroke:#2E2E2E;stroke-width:1"/>
  <circle cx="655" cy="52" r="14" fill="url(#ogGrad)"/>
  <text x="655" y="57" text-anchor="middle" style="font-size:12px;font-weight:700;fill:#FFFFFF;font-family:system-ui,sans-serif">4</text>
  <!-- Icon: terminal -->
  <g transform="translate(486,37)">
    <rect x="200" y="0" width="20" height="14" rx="2" fill="none" style="stroke:#A0A0A0;stroke-width:1.5"/>
    <polyline points="203,4 207,7 203,10" fill="none" style="stroke:#A0A0A0;stroke-width:1.3"/>
    <line x1="209" y1="10" x2="214" y2="10" style="stroke:#A0A0A0;stroke-width:1.3"/>
  </g>
  <text x="700" y="95" text-anchor="middle" style="font-size:16px;font-weight:600;fill:#FFFFFF;font-family:system-ui,sans-serif">Use</text>
  <text x="700" y="120" text-anchor="middle" style="font-size:10px;fill:#A0A0A0;font-family:'Courier New',monospace">localvoice transcribe</text>
  <rect x="635" y="140" width="130" height="2" rx="1" fill="url(#ogGrad)" style="opacity:0.3"/>
</svg>