<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F07A3A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8432A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0D0D0D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F07A3A;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#E8432A;stop-opacity:0.02" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)" />

  <!-- Subtle grid pattern -->
  <g style="opacity:0.03">
    <line x1="0" y1="100" x2="800" y2="100" style="stroke:#FFFFFF;stroke-width:0.5" />
    <line x1="0" y1="200" x2="800" y2="200" style="stroke:#FFFFFF;stroke-width:0.5" />
    <line x1="0" y1="300" x2="800" y2="300" style="stroke:#FFFFFF;stroke-width:0.5" />
    <line x1="0" y1="400" x2="800" y2="400" style="stroke:#FFFFFF;stroke-width:0.5" />
    <line x1="0" y1="500" x2="800" y2="500" style="stroke:#FFFFFF;stroke-width:0.5" />
    <line x1="200" y1="0" x2="200" y2="600" style="stroke:#FFFFFF;stroke-width:0.5" />
    <line x1="400" y1="0" x2="400" y2="600" style="stroke:#FFFFFF;stroke-width:0.5" />
    <line x1="600" y1="0" x2="600" y2="600" style="stroke:#FFFFFF;stroke-width:0.5" />
  </g>

  <!-- ========== HEADER ========== -->
  <g>
    <!-- Terminal window icon -->
    <rect x="40" y="28" width="48" height="36" rx="6" style="fill:#1A1A1A;stroke:#2E2E2E;stroke-width:1.5" />
    <circle cx="52" cy="38" r="3" style="fill:#E8432A" />
    <circle cx="62" cy="38" r="3" style="fill:#FF8C42" />
    <circle cx="72" cy="38" r="3" style="fill:#4CAF50" />
    <text x="50" y="57" style="font-family:'Courier New',monospace;font-size:9px;fill:#A0A0A0">$_</text>

    <!-- Title -->
    <text x="100" y="44" style="font-family:system-ui,-apple-system,sans-serif;font-size:26px;font-weight:700;fill:#FFFFFF;letter-spacing:3px">CLI COMMANDS</text>
    <text x="100" y="62" style="font-family:system-ui,-apple-system,sans-serif;font-size:12px;fill:#A0A0A0;letter-spacing:1px">LocalVoice — Voice Processing Toolkit</text>

    <!-- Decorative header line -->
    <rect x="40" y="78" width="720" height="2" rx="1" fill="url(#accentGrad)" style="opacity:0.6" />
  </g>

  <!-- ========== CARD 1: TRANSCRIBE (top-left) ========== -->
  <g>
    <!-- Card background -->
    <rect x="40" y="100" width="352" height="200" rx="8" style="fill:#1A1A1A;stroke:#2E2E2E;stroke-width:1" />
    <!-- Top accent line -->
    <rect x="40" y="100" width="352" height="3" rx="1.5" fill="url(#accentGrad)" />
    <!-- Subtle card glow overlay -->
    <rect x="40" y="100" width="352" height="200" rx="8" fill="url(#cardGlow)" />

    <!-- Waveform icon -->
    <g style="transform:translate(60px, 126px)">
      <rect x="0" y="6" width="3" height="8" rx="1" style="fill:#F07A3A" />
      <rect x="5" y="3" width="3" height="14" rx="1" style="fill:#F07A3A" />
      <rect x="10" y="0" width="3" height="20" rx="1" style="fill:#F07A3A" />
      <rect x="15" y="5" width="3" height="10" rx="1" style="fill:#F07A3A" />
      <rect x="20" y="2" width="3" height="16" rx="1" style="fill:#F07A3A" />
      <rect x="25" y="7" width="3" height="6" rx="1" style="fill:#F07A3A" />
      <rect x="30" y="4" width="3" height="12" rx="1" style="fill:#F07A3A" />
    </g>

    <!-- Command name -->
    <text x="102" y="141" style="font-family:system-ui,-apple-system,sans-serif;font-size:18px;font-weight:700;fill:#F07A3A">transcribe</text>

    <!-- Description -->
    <text x="60" y="168" style="font-family:system-ui,-apple-system,sans-serif;font-size:11px;fill:#A0A0A0">Convert audio files to text using Whisper STT</text>

    <!-- Command string -->
    <rect x="60" y="180" width="312" height="30" rx="4" style="fill:#242424" />
    <text x="70" y="200" style="font-family:'Courier New',monospace;font-size:13px;fill:#FFFFFF">$ localvoice transcribe &lt;file&gt;</text>

    <!-- Flags -->
    <text x="60" y="234" style="font-family:'Courier New',monospace;font-size:11px;fill:#A0A0A0">--language</text>
    <text x="160" y="234" style="font-family:'Courier New',monospace;font-size:11px;fill:#A0A0A0">--format</text>
    <text x="240" y="234" style="font-family:'Courier New',monospace;font-size:11px;fill:#A0A0A0">--json</text>

    <!-- Flag dots -->
    <circle cx="54" cy="231" r="2" style="fill:#FF8C42" />
    <circle cx="154" cy="231" r="2" style="fill:#FF8C42" />
    <circle cx="234" cy="231" r="2" style="fill:#FF8C42" />

    <!-- Card number -->
    <text x="362" y="120" style="font-family:system-ui,-apple-system,sans-serif;font-size:40px;font-weight:800;fill:#FFFFFF;opacity:0.04;text-anchor:end">01</text>
  </g>

  <!-- ========== CARD 2: SPEAK (top-right) ========== -->
  <g>
    <rect x="408" y="100" width="352" height="200" rx="8" style="fill:#1A1A1A;stroke:#2E2E2E;stroke-width:1" />
    <rect x="408" y="100" width="352" height="3" rx="1.5" fill="url(#accentGrad)" />
    <rect x="408" y="100" width="352" height="200" rx="8" fill="url(#cardGlow)" />

    <!-- Speaker icon -->
    <g style="transform:translate(428px, 124px)">
      <path d="M0,8 L6,8 L14,2 L14,22 L6,16 L0,16 Z" style="fill:#F07A3A" />
      <path d="M18,7 Q24,12 18,17" style="fill:none;stroke:#F07A3A;stroke-width:2;stroke-linecap:round" />
      <path d="M21,3 Q30,12 21,21" style="fill:none;stroke:#F07A3A;stroke-width:2;stroke-linecap:round;opacity:0.5" />
    </g>

    <text x="466" y="141" style="font-family:system-ui,-apple-system,sans-serif;font-size:18px;font-weight:700;fill:#F07A3A">speak</text>

    <text x="428" y="168" style="font-family:system-ui,-apple-system,sans-serif;font-size:11px;fill:#A0A0A0">Generate speech from text via Piper or Parler TTS</text>

    <rect x="428" y="180" width="312" height="30" rx="4" style="fill:#242424" />
    <text x="438" y="200" style="font-family:'Courier New',monospace;font-size:13px;fill:#FFFFFF">$ localvoice speak "hello world"</text>

    <text x="428" y="234" style="font-family:'Courier New',monospace;font-size:11px;fill:#A0A0A0">--engine</text>
    <text x="518" y="234" style="font-family:'Courier New',monospace;font-size:11px;fill:#A0A0A0">--output</text>
    <text x="606" y="234" style="font-family:'Courier New',monospace;font-size:11px;fill:#A0A0A0">--description</text>

    <circle cx="422" cy="231" r="2" style="fill:#FF8C42" />
    <circle cx="512" cy="231" r="2" style="fill:#FF8C42" />
    <circle cx="600" cy="231" r="2" style="fill:#FF8C42" />

    <text x="730" y="120" style="font-family:system-ui,-apple-system,sans-serif;font-size:40px;font-weight:800;fill:#FFFFFF;opacity:0.04;text-anchor:end">02</text>
  </g>

  <!-- ========== CARD 3: HEALTH (bottom-left) ========== -->
  <g>
    <rect x="40" y="316" width="352" height="200" rx="8" style="fill:#1A1A1A;stroke:#2E2E2E;stroke-width:1" />
    <rect x="40" y="316" width="352" height="3" rx="1.5" fill="url(#accentGrad)" />
    <rect x="40" y="316" width="352" height="200" rx="8" fill="url(#cardGlow)" />

    <!-- Heartbeat/pulse icon -->
    <g style="transform:translate(60px, 340px)">
      <path d="M0,10 L8,10 L11,2 L15,18 L19,6 L22,10 L30,10" style="fill:none;stroke:#F07A3A;stroke-width:2;stroke-linecap:round;stroke-linejoin:round" />
    </g>

    <text x="100" y="357" style="font-family:system-ui,-apple-system,sans-serif;font-size:18px;font-weight:700;fill:#F07A3A">health</text>

    <text x="60" y="384" style="font-family:system-ui,-apple-system,sans-serif;font-size:11px;fill:#A0A0A0">Check status of all voice processing services</text>

    <rect x="60" y="396" width="312" height="30" rx="4" style="fill:#242424" />
    <text x="70" y="416" style="font-family:'Courier New',monospace;font-size:13px;fill:#FFFFFF">$ localvoice health</text>

    <!-- Status indicator dots with labels -->
    <circle cx="72" cy="452" r="5" style="fill:#4CAF50" />
    <text x="84" y="456" style="font-family:'Courier New',monospace;font-size:11px;fill:#A0A0A0">whisper</text>

    <circle cx="162" cy="452" r="5" style="fill:#4CAF50" />
    <text x="174" y="456" style="font-family:'Courier New',monospace;font-size:11px;fill:#A0A0A0">piper</text>

    <circle cx="242" cy="452" r="5" style="fill:#FF8C42" />
    <text x="254" y="456" style="font-family:'Courier New',monospace;font-size:11px;fill:#A0A0A0">parler</text>

    <!-- Status labels -->
    <text x="60" y="488" style="font-family:system-ui,-apple-system,sans-serif;font-size:10px;fill:#A0A0A0">Returns JSON status for each service endpoint</text>

    <text x="362" y="336" style="font-family:system-ui,-apple-system,sans-serif;font-size:40px;font-weight:800;fill:#FFFFFF;opacity:0.04;text-anchor:end">03</text>
  </g>

  <!-- ========== CARD 4: SPEAKERS (bottom-right) ========== -->
  <g>
    <rect x="408" y="316" width="352" height="200" rx="8" style="fill:#1A1A1A;stroke:#2E2E2E;stroke-width:1" />
    <rect x="408" y="316" width="352" height="3" rx="1.5" fill="url(#accentGrad)" />
    <rect x="408" y="316" width="352" height="200" rx="8" fill="url(#cardGlow)" />

    <!-- List icon -->
    <g style="transform:translate(428px, 340px)">
      <rect x="0" y="0" width="4" height="4" rx="1" style="fill:#F07A3A" />
      <rect x="8" y="1" width="22" height="2" rx="1" style="fill:#F07A3A" />
      <rect x="0" y="8" width="4" height="4" rx="1" style="fill:#F07A3A" />
      <rect x="8" y="9" width="22" height="2" rx="1" style="fill:#F07A3A" />
      <rect x="0" y="16" width="4" height="4" rx="1" style="fill:#F07A3A" />
      <rect x="8" y="17" width="22" height="2" rx="1" style="fill:#F07A3A" />
    </g>

    <text x="468" y="357" style="font-family:system-ui,-apple-system,sans-serif;font-size:18px;font-weight:700;fill:#F07A3A">speakers</text>

    <text x="428" y="384" style="font-family:system-ui,-apple-system,sans-serif;font-size:11px;fill:#A0A0A0">List all available voice models and speakers</text>

    <rect x="428" y="396" width="312" height="30" rx="4" style="fill:#242424" />
    <text x="438" y="416" style="font-family:'Courier New',monospace;font-size:13px;fill:#FFFFFF">$ localvoice speakers</text>

    <!-- Voice list preview -->
    <g style="opacity:0.85">
      <rect x="428" y="438" width="140" height="22" rx="4" style="fill:#242424" />
      <text x="438" y="453" style="font-family:'Courier New',monospace;font-size:10px;fill:#4CAF50">●</text>
      <text x="450" y="453" style="font-family:'Courier New',monospace;font-size:10px;fill:#A0A0A0">en_US-lessac</text>

      <rect x="578" y="438" width="140" height="22" rx="4" style="fill:#242424" />
      <text x="588" y="453" style="font-family:'Courier New',monospace;font-size:10px;fill:#4CAF50">●</text>
      <text x="600" y="453" style="font-family:'Courier New',monospace;font-size:10px;fill:#A0A0A0">en_US-amy</text>

      <rect x="428" y="466" width="140" height="22" rx="4" style="fill:#242424" />
      <text x="438" y="481" style="font-family:'Courier New',monospace;font-size:10px;fill:#4CAF50">●</text>
      <text x="450" y="481" style="font-family:'Courier New',monospace;font-size:10px;fill:#A0A0A0">en_GB-alba</text>

      <rect x="578" y="466" width="140" height="22" rx="4" style="fill:#242424" />
      <text x="588" y="481" style="font-family:'Courier New',monospace;font-size:10px;fill:#F07A3A">+</text>
      <text x="600" y="481" style="font-family:'Courier New',monospace;font-size:10px;fill:#A0A0A0">more voices...</text>
    </g>

    <text x="730" y="336" style="font-family:system-ui,-apple-system,sans-serif;font-size:40px;font-weight:800;fill:#FFFFFF;opacity:0.04;text-anchor:end">04</text>
  </g>

  <!-- ========== BOTTOM BAR ========== -->
  <g>
    <rect x="40" y="545" width="720" height="1" rx="0.5" style="fill:#2E2E2E" />
    <text x="400" y="570" style="font-family:system-ui,-apple-system,sans-serif;font-size:11px;fill:#A0A0A0;text-anchor:middle">Powered by Bun + TypeScript  |  Zero dependencies  |  100% local processing</text>

    <!-- Small decorative elements -->
    <circle cx="40" cy="568" r="2" style="fill:#E8432A;opacity:0.4" />
    <circle cx="760" cy="568" r="2" style="fill:#F07A3A;opacity:0.4" />
  </g>

  <!-- Corner accents -->
  <line x1="40" y1="590" x2="100" y2="590" style="stroke:url(#accentGrad);stroke-width:1;opacity:0.3" />
  <line x1="700" y1="590" x2="760" y2="590" style="stroke:url(#accentGrad);stroke-width:1;opacity:0.3" />
</svg>